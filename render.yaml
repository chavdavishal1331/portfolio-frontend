services:
  - type: web
    name: portfolio-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE
        value: https://portfolio-backend-ro4m.onrender.com
